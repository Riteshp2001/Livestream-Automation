<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monochrome Rain Visualizer</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <canvas id="glCanvas"></canvas>

    <script id="vs" type="x-shader/x-vertex">
      attribute vec4 a_position;
      attribute float a_speed;
      attribute float a_length;
      attribute float a_depth;

      uniform float u_time;

      varying float v_depth;
      varying float v_brightness;

      void main() {
        v_depth = a_depth;

        float y = mod(a_position.y - (u_time * a_speed * 1.5), 2.5) - 1.25;
        float x = a_position.x;
        float size = 1.0 - a_depth * 0.7;

        gl_PointSize = a_length * size;
        gl_Position = vec4(x, y, 0.0, 1.0);
        v_brightness = (1.0 - a_depth) * 0.6;
      }
    </script>

    <script id="fs" type="x-shader/x-fragment">
      precision mediump float;

      varying float v_depth;
      varying float v_brightness;

      void main() {
        vec2 cxy = 2.0 * gl_PointCoord - 1.0;
        float r = dot(cxy, cxy);

        float streak = 1.0 - smoothstep(0.0, 1.0, abs(cxy.x * 4.0));
        streak *= 1.0 - smoothstep(0.0, 1.0, abs(cxy.y));

        float alpha = streak * v_brightness * (1.0 - r);
        gl_FragColor = vec4(vec3(v_brightness + 0.2), alpha);
      }
    </script>

    <script>
      const canvas = document.getElementById("glCanvas");
      const gl = canvas.getContext("webgl", {
        antialias: true,
        alpha: false,
        powerPreference: "high-performance",
      });

      function startFallbackRain() {
        const ctx = canvas.getContext("2d");
        const dropCount = 1100;
        const drops = Array.from({ length: dropCount }, () => ({
          x: Math.random(),
          y: Math.random() * 1.4 - 0.2,
          speed: 0.9 + Math.random() * 1.2,
          length: 10 + Math.random() * 28,
          width: 0.6 + Math.random() * 1.6,
          alpha: 0.08 + Math.random() * 0.18,
        }));

        function resize() {
          const dpr = window.devicePixelRatio || 1;
          canvas.width = Math.round(window.innerWidth * dpr);
          canvas.height = Math.round(window.innerHeight * dpr);
          canvas.style.width = `${window.innerWidth}px`;
          canvas.style.height = `${window.innerHeight}px`;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function draw(time) {
          const t = time * 0.001;
          ctx.fillStyle = "rgb(10, 10, 11)";
          ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

          drops.forEach((drop, index) => {
            const wind = Math.sin(t * 0.7 + index * 0.005) * 10;
            drop.y += drop.speed * 0.014;
            if (drop.y > 1.22) {
              drop.y = -0.18 - Math.random() * 0.1;
              drop.x = Math.random();
            }

            const x = drop.x * window.innerWidth;
            const y = drop.y * window.innerHeight;

            ctx.strokeStyle = `rgba(225, 225, 225, ${drop.alpha})`;
            ctx.lineWidth = drop.width;
            ctx.beginPath();
            ctx.moveTo(x - 8 - wind * 0.15, y - drop.length);
            ctx.lineTo(x, y);
            ctx.stroke();
          });

          requestAnimationFrame(draw);
        }

        window.addEventListener("resize", resize);
        resize();
        requestAnimationFrame(draw);
      }

      if (!gl) {
        startFallbackRain();
      } else {
        function createShader(type, source) {
          const shader = gl.createShader(type);
          gl.shaderSource(shader, source);
          gl.compileShader(shader);
          if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            console.error(gl.getShaderInfoLog(shader));
            gl.deleteShader(shader);
            return null;
          }
          return shader;
        }

        const vertexShader = createShader(
          gl.VERTEX_SHADER,
          document.getElementById("vs").textContent,
        );
        const fragmentShader = createShader(
          gl.FRAGMENT_SHADER,
          document.getElementById("fs").textContent,
        );

        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);
        gl.useProgram(program);

        const count = 3000;
        const positions = new Float32Array(count * 2);
        const speeds = new Float32Array(count);
        const lengths = new Float32Array(count);
        const depths = new Float32Array(count);

        for (let i = 0; i < count; i += 1) {
          positions[i * 2] = Math.random() * 2 - 1;
          positions[i * 2 + 1] = Math.random() * 2 - 1;
          speeds[i] = 0.2 + Math.random() * 0.5;
          lengths[i] = 2.0 + Math.random() * 15.0;
          depths[i] = Math.random();
        }

        function createBuffer(data, attributeName, size) {
          const buffer = gl.createBuffer();
          gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
          gl.bufferData(gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);
          const location = gl.getAttribLocation(program, attributeName);
          gl.enableVertexAttribArray(location);
          gl.vertexAttribPointer(location, size, gl.FLOAT, false, 0, 0);
          return buffer;
        }

        createBuffer(positions, "a_position", 2);
        createBuffer(speeds, "a_speed", 1);
        createBuffer(lengths, "a_length", 1);
        createBuffer(depths, "a_depth", 1);

        const timeLoc = gl.getUniformLocation(program, "u_time");

        function resize() {
          const dpr = window.devicePixelRatio || 1;
          canvas.width = Math.round(window.innerWidth * dpr);
          canvas.height = Math.round(window.innerHeight * dpr);
          canvas.style.width = `${window.innerWidth}px`;
          canvas.style.height = `${window.innerHeight}px`;
          gl.viewport(0, 0, canvas.width, canvas.height);
        }

        function render(time) {
          const seconds = time * 0.001;
          gl.clearColor(0.04, 0.04, 0.05, 1.0);
          gl.clear(gl.COLOR_BUFFER_BIT);
          gl.enable(gl.BLEND);
          gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
          gl.uniform1f(timeLoc, seconds);
          gl.drawArrays(gl.POINTS, 0, count);
          requestAnimationFrame(render);
        }

        window.addEventListener("resize", resize);
        resize();
        requestAnimationFrame(render);
      }
    </script>
  </body>
</html>
